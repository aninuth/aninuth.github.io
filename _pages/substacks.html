const DIFF_LABELS = { 1: "Accessible", 2: "Some background", 3: "Technical" };
const DIFF_CLASS  = { 1: "diff-1", 2: "diff-2", 3: "diff-3" };

// Load favourites from localStorage
const FAV_KEY = "rl-favs";
function loadFavs() {
  try { return JSON.parse(localStorage.getItem(FAV_KEY) || "{}"); } catch { return {}; }
}
function saveFavs(favs) {
  try { localStorage.setItem(FAV_KEY, JSON.stringify(favs)); } catch {}
}
let favs = loadFavs();

// Collect all tags
const allTags = [...new Set(BLOGS.reduce((acc, b) => acc.concat(b.tags), []))].sort();

let activeTags = new Set();
let searchQuery = "";

// ── Render tag bar ──
const tagBar = document.getElementById("tag-bar");
const clearBtn = document.createElement("button");
clearBtn.className = "tag-btn clear-btn";
clearBtn.textContent = "Clear";
clearBtn.onclick = function() { activeTags.clear(); renderTagBar(); renderGrid(); };

allTags.forEach(tag => {
  const btn = document.createElement("button");
  btn.className = "tag-btn";
  btn.dataset.tag = tag;
  btn.textContent = tag;
  btn.onclick = function() {
    if (activeTags.has(tag)) activeTags.delete(tag);
    else activeTags.add(tag);
    renderTagBar();
    renderGrid();
  };
  tagBar.appendChild(btn);
});
tagBar.appendChild(clearBtn);

function renderTagBar() {
  tagBar.querySelectorAll(".tag-btn[data-tag]").forEach(btn => {
    btn.classList.toggle("active", activeTags.has(btn.dataset.tag));
  });
}

// ── Render grid ──
const grid = document.getElementById("rl-grid");
const countEl = document.getElementById("rl-count");

function matchesBlog(blog) {
  const q = searchQuery.toLowerCase();
  if (q) {
    const hay = [blog.name, blog.author, blog.desc].concat(blog.tags).join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  if (activeTags.size > 0) {
    if (!blog.tags.some(function(t) { return activeTags.has(t); })) return false;
  }
  return true;
}

function renderGrid() {
  grid.innerHTML = "";
  const matches = BLOGS.filter(matchesBlog);

  if (matches.length === 0) {
    const empty = document.createElement("div");
    empty.className = "rl-empty";
    empty.textContent = "No blogs match your filters.";
    grid.appendChild(empty);
    countEl.textContent = "";
    return;
  }

  countEl.textContent = `Showing ${matches.length} of ${BLOGS.length} blogs`;

  // Sort: favourites first, then alphabetical
  matches.sort(function(a, b) {
    const af = !!favs[a.url], bf = !!favs[b.url];
    if (af !== bf) return af ? -1 : 1;
    return a.name.localeCompare(b.name);
  });

  matches.forEach(function(blog) {
    const card = document.createElement("div");
    card.className = "rl-card";

    const isFav = !!favs[blog.url];

    // Top row
    const top = document.createElement("div");
    top.className = "card-top";

    const titleWrap = document.createElement("div");
    titleWrap.className = "card-title-wrap";

    const a = document.createElement("a");
    a.className = "card-title";
    a.href = blog.url;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.textContent = blog.name;
    titleWrap.appendChild(a);

    if (blog.author) {
      const auth = document.createElement("div");
      auth.className = "card-author";
      auth.textContent = blog.author;
      titleWrap.appendChild(auth);
    }

    const star = document.createElement("button");
    star.className = "star-btn" + (isFav ? " starred" : "");
    star.textContent = "★";
    star.title = isFav ? "Remove from favourites" : "Mark as favourite";
    star.setAttribute("aria-label", isFav ? "Unfavourite" : "Favourite");
    star.onclick = function() {
      if (favs[blog.url]) delete favs[blog.url];
      else favs[blog.url] = true;
      saveFavs(favs);
      renderGrid();
    };

    top.appendChild(titleWrap);
    top.appendChild(star);
    card.appendChild(top);

    // Description
    const desc = document.createElement("p");
    desc.className = "card-desc";
    desc.textContent = blog.desc;
    card.appendChild(desc);

    // Footer: tags + difficulty
    const footer = document.createElement("div");
    footer.className = "card-footer";

    blog.tags.forEach(tag => {
      const pill = document.createElement("span");
      pill.className = "tag-pill";
      pill.textContent = tag;
      footer.appendChild(pill);
    });

    const diff = document.createElement("span");
    diff.className = "diff-badge " + DIFF_CLASS[blog.diff];
    diff.textContent = DIFF_LABELS[blog.diff];
    footer.appendChild(diff);

    card.appendChild(footer);
    grid.appendChild(card);
  });
}

// ── Search ──
document.getElementById("rl-search").addEventListener("input", function(e) {
  searchQuery = e.target.value.trim();
  renderGrid();
});

renderGrid();
</script>
